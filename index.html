<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATO Tools">
<title>ATOALH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', monospace;
  background: #0c0e0d;
  color: #dde6df;
  padding: 20px 16px 48px;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}

.page-header { margin-bottom: 28px; }
.page-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800;
  letter-spacing: -0.5px; margin-bottom: 2px;
  color: #dde6df;
}
.page-header p { font-size: 13px; color: #586860; }

.group { margin-bottom: 24px; }
.group-header {
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.group-header h2 {
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
}
.group-header .count { font-size: 12px; font-weight: 500; opacity: 0.65; }

/* Home group — beige on dark */
.group-home .group-header {
  background: #1c201c; color: #c8a97a;
  border: 1px solid #2e362e;
}
/* ATO Life group — yellow on dark */
.group-life .group-header {
  background: rgba(230,184,0,0.10); color: #e6b800;
  border: 1px solid rgba(230,184,0,0.18);
}

.tool-card {
  display: flex; align-items: center; justify-content: space-between;
  background: #141714;
  border: 1px solid #222822;
  border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  text-decoration: none; color: #dde6df;
  transition: background 0.12s, transform 0.1s;
  -webkit-tap-highlight-color: transparent; cursor: pointer;
}
.tool-card:active { transform: scale(0.98); background: #1c201c; }
.tool-left { display: flex; align-items: center; gap: 12px; }
.tool-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}

/* Icon tints */
.icon-finance-ato  { background: rgba(230,184,0,0.13); }
.icon-finance-alh  { background: rgba(61,220,132,0.10); }
.icon-food         { background: rgba(200,169,122,0.12); }
.icon-recipe       { background: rgba(200,169,122,0.10); }
.icon-mealprep     { background: rgba(200,169,122,0.10); }
.icon-nutrition    { background: rgba(61,220,132,0.10); }
.icon-stretching   { background: rgba(230,184,0,0.10); }

.tool-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; color: #dde6df; }
.tool-info p  { font-size: 12px; color: #586860; }
.tool-arrow   { font-size: 18px; color: #3a4440; flex-shrink: 0; }

.footer { text-align: center; font-size: 11px; color: #3a4440; margin-top: 8px; }
</style>
</head>
<body>

<div class="page-header">
  <h1>ATO ALH</h1>
</div>

<!-- Home Group -->
<div class="group group-home">
  <div class="group-header">
    <h2>🏠 Home</h2>
  </div>

  <a class="tool-card" href="home/finance-ato/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-finance-ato">💳</div>
      <div class="tool-info">
        <h3>ATO Finance</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="home/finance-alh/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-finance-alh">💳</div>
      <div class="tool-info">
        <h3>ALH Finance</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="home/food-database/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-food">🥦</div>
      <div class="tool-info">
        <h3>Food Database</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="home/recipe-database/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-recipe">📖</div>
      <div class="tool-info">
        <h3>Recipe Database</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="home/meal-prep-planner/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-mealprep">🥗</div>
      <div class="tool-info">
        <h3>Meal Prep Planner</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>
</div>

<!-- ATO Life Group -->
<div class="group group-life">
  <div class="group-header">
    <h2>⚡ Life & Health</h2>
  </div>

  <a class="tool-card" href="ato-life/nutrition/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-nutrition">🥑</div>
      <div class="tool-info">
        <h3>Exercise & Nutrition</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a class="tool-card" href="ato-life/stretching-running-sp/index.html">
    <div class="tool-left">
      <div class="tool-icon icon-stretching">🏃</div>
      <div class="tool-info">
        <h3>SRS&P</h3>
      </div>
    </div>
    <span class="tool-arrow">›</span>
  </a>
</div>

</body>
</html>
