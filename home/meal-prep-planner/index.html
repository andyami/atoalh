<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Prep Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e0d; --surface: #141714; --surface2: #1c201c;
  --header-bg: #0c0e0d;
  --text: #dde6df; --text-muted: #586860; --border: #222822;
  --alh: #3ddc84; --alh-light: rgba(61,220,132,0.08); --alh-header: #3ddc84;
  --ato: #4a9eff; --ato-light: rgba(74,158,255,0.08); --ato-header: #4a9eff;
  --total: #f0b429; --total-light: rgba(240,180,41,0.09); --total-header: #f0b429;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--header-bg);padding:22px 36px 18px;color:white;}
.header h1{font-family:'Barlow Semi Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.mode-bar{background:#F0EDE8;border-bottom:2px solid var(--border);padding:16px 36px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.mode-label{font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--header-bg);}
.mode-toggle{display:flex;border-radius:10px;overflow:hidden;border:2px solid var(--border);background:var(--surface);}
.mode-btn{padding:9px 20px;font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:background .15s,color .15s;}
.mode-btn.active-same{background:var(--alh);color:white;}
.mode-btn.active-diff{background:var(--ato);color:white;}
.mode-hint{font-size:12px;color:var(--text-muted);font-style:italic;}
.main{padding:28px 36px;max-width:1400px;margin:0 auto;}
.section-title{font-family:'Barlow Semi Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:18px;color:var(--header-bg);display:flex;align-items:center;gap:12px;}
.section-title .sub{font-size:13px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--text-muted);}

/* MEAL CARDS */
.carb-group{margin-bottom:22px;}
.carb-group-header{display:flex;align-items:center;gap:10px;font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--header-bg);margin-bottom:9px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.carb-count{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:none;letter-spacing:0;margin-left:auto;}
.meal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
.meal-card{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px 13px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;user-select:none;position:relative;}
.meal-card:hover{box-shadow:0 4px 14px rgba(45,106,79,.12);transform:translateY(-1px);}
.meal-card.sel-both{border-color:#7B3FA0;background:#F5EFF9;}
.meal-card.sel-alh{border-color:var(--alh);background:#F0F8F4;}
.meal-card.sel-ato{border-color:var(--ato);background:#EEF3FB;}
.meal-check{position:absolute;top:9px;right:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;background:var(--border);transition:background .15s,color .15s;}
.meal-card.sel-alh .meal-check{background:var(--alh);color:white;}
.meal-card.sel-ato .meal-check{background:var(--ato);color:white;}
.meal-card.sel-both .meal-check{background:#7B3FA0;color:white;}
.meal-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.meal-name{font-family:'Barlow Semi Condensed',sans-serif;font-size:14px;font-weight:700;line-height:1.25;margin-bottom:8px;padding-right:26px;}
.meal-macros{display:flex;flex-direction:column;gap:3px;}
.macro-row{display:flex;align-items:center;gap:5px;}
.macro-who{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:28px;text-align:center;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.3px;}
.macro-who.alh{background:var(--alh-light);color:var(--alh);}
.macro-who.ato{background:var(--ato-light);color:var(--ato);}
.macro-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
.meal-note{font-size:10px;color:#92400E;background:#FEF3C7;border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:2px 7px;margin-top:5px;font-style:italic;}
.person-panels{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.person-panel{background:var(--surface);border-radius:12px;padding:18px;border:2px solid var(--border);}
.person-panel.panel-alh{border-color:rgba(45,106,79,.35);}
.person-panel.panel-ato{border-color:rgba(27,58,107,.35);}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border);}
.panel-badge{font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:800;padding:4px 12px;border-radius:6px;letter-spacing:0.5px;}
.panel-badge.alh{background:var(--alh-light);color:var(--alh-header);}
.panel-badge.ato{background:var(--ato-light);color:var(--ato-header);}
.panel-sel-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-left:auto;}

/* SHOPPING LIST */
.divider{border:none;border-top:2px solid var(--border);margin:28px 0;}
.shopping-empty{background:var(--surface);border:2px dashed var(--border);border-radius:10px;padding:40px 32px;text-align:center;color:var(--text-muted);}
.shopping-empty p{font-size:16px;margin-bottom:6px;font-weight:500;}
.shopping-empty small{font-size:13px;opacity:.7;}
.shopping-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
.selected-pills{display:flex;flex-wrap:wrap;gap:6px;}
.selected-pill{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--alh-light);color:var(--alh);border:1px solid rgba(45,106,79,.25);}
.selected-pill.ato-pill{background:var(--ato-light);color:var(--ato);border-color:rgba(27,58,107,.25);}
.actions{display:flex;gap:8px;}
.btn{border:none;padding:9px 18px;border-radius:7px;font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:opacity .15s;text-transform:uppercase;}
.btn:hover{opacity:.85;}
.btn-print{background:var(--header-bg);color:white;}
.btn-clear{background:#f0ece6;color:var(--text-muted);}
.table-section{margin-bottom:6px;}
.cat-header{font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--header-bg);padding:10px 13px 8px;border-bottom:2px solid var(--header-bg);background:#EDEAE5;border-radius:8px 8px 0 0;}
.shopping-table{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.shopping-table th{padding:8px 12px;font-family:'Barlow Semi Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.th-check{background:#F8F7F4;width:38px;}.th-item{background:#F8F7F4;color:var(--text);min-width:180px;}
.th-total{background:var(--total-light);color:var(--total-header);min-width:120px;}
.th-ato{background:var(--ato-light);color:var(--ato-header);min-width:120px;}
.th-alh{background:var(--alh-light);color:var(--alh-header);min-width:120px;}
.th-tags{background:#F8F7F4;color:var(--text-muted);min-width:160px;}
.shopping-table td{padding:8px 12px;border-bottom:1px solid #F0EDE8;vertical-align:middle;}
.shopping-table tr:last-child td{border-bottom:none;}
.shopping-table tr:hover td{background:rgba(0,0,0,.015);}
.shopping-table tr.have-it .td-item,.shopping-table tr.have-it .td-total,.shopping-table tr.have-it .td-ato,.shopping-table tr.have-it .td-alh,.shopping-table tr.have-it .td-tags{opacity:.35;text-decoration:line-through;}
.td-item{font-weight:500;}
.td-total{font-family:'DM Mono',monospace;font-size:12px;color:var(--total);font-weight:500;background:var(--total-light);}
.td-ato{font-family:'DM Mono',monospace;font-size:12px;color:var(--ato);background:var(--ato-light);}
.td-alh{font-family:'DM Mono',monospace;font-size:12px;color:var(--alh);background:var(--alh-light);}
.td-taste{font-style:italic;font-size:12px;color:var(--text-muted);}
.td-check input{cursor:pointer;width:15px;height:15px;accent-color:var(--alh);}
.tag{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;padding:2px 7px;border-radius:4px;border:1px solid;margin:2px 2px 2px 0;white-space:nowrap;}

/* SHOP PLAN */
.shop-plan-section{margin-top:32px;}
.shop-plan-notice{background:#FFF8E1;border:1.5px solid #F0C040;border-radius:8px;padding:10px 14px;font-size:12.5px;color:#5A4000;margin-bottom:16px;line-height:1.5;}
.shop-plan-notice strong{font-weight:700;}
.shop-group{margin-bottom:14px;background:var(--surface);border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.shop-group-header{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.shop-group-name{font-family:'Barlow Semi Condensed',sans-serif;font-size:16px;font-weight:800;color:white;display:flex;align-items:center;gap:8px;letter-spacing:.3px;}
.shop-group-count{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.75);}
.shop-plan-table{width:100%;border-collapse:collapse;font-size:13px;}
.shop-plan-table td{padding:9px 14px;border-bottom:1px solid var(--bg);vertical-align:middle;}
.shop-plan-table tr:last-child td{border-bottom:none;}
.shop-plan-table tr:hover td{background:#FAFAF8;}
.sp-name{font-weight:500;}
.sp-desc{font-size:11px;color:var(--text-muted);font-style:italic;margin-top:2px;}
.sp-qty{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);white-space:nowrap;text-align:right;padding-right:8px;}
.sp-action{text-align:right;white-space:nowrap;}
.btn-reassign{background:none;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;font-family:'Barlow Semi Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;letter-spacing:.3px;transition:border-color .15s,color .15s;}
.btn-reassign:hover{border-color:var(--alh);color:var(--alh);}
.sp-only{font-size:11px;color:#ccc;font-style:italic;}
/* Shop colours */
.sh-aldi{background:#00529F;} .sh-lidl{background:#003D8F;}
.sh-ms{background:#2C0A4A;} .sh-tesco{background:#003D8F;}
.sh-asda{background:#2B6200;} .sh-morrisons{background:#8A6200;}
.sh-sains{background:#B83A00;} .sh-online{background:#3730A3;}

/* PRINT */
@media print{
  .mode-bar,.actions,.selected-pills,.shop-plan-section{display:none!important;}
  .header{padding:14px 20px;}.header h1{font-size:20px;}
  .main{padding:12px 16px;}
  .shopping-table{font-size:11px;box-shadow:none;}
  .shopping-table td,.shopping-table th{padding:5px 8px;}
  body{background:white;}
}
@media(max-width:900px){
  .person-panels{grid-template-columns:1fr;}
  .main{padding:16px;}.header{padding:16px;}.mode-bar{padding:12px 16px;flex-wrap:wrap;gap:10px;}
  .shopping-table{display:block;overflow-x:auto;}
  .shop-plan-table{display:block;overflow-x:auto;}
}


/* ─── DARK THEME OVERRIDE ─── */
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

.header { background: var(--header-bg); border-bottom: 1px solid var(--border); }
.header h1 { font-family: 'Syne', sans-serif; color: var(--text); }

.mode-bar { background: var(--surface); border-bottom: 1px solid var(--border); }
.mode-label { color: var(--muted, var(--text-muted)); font-family: 'DM Mono', monospace; }
.mode-toggle { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; }
.mode-btn { color: var(--text-muted); font-family: 'DM Mono', monospace; }
.mode-btn.active-same { background: var(--alh); color: #0c0e0d; }
.mode-btn.active-diff { background: var(--ato); color: #0c0e0d; }
.mode-hint { color: var(--text-muted); }

.section-title { font-family: 'Syne', sans-serif; color: var(--text); }
.carb-group-header { color: var(--text); border-bottom: 2px solid var(--border); font-family: 'DM Mono', monospace; }
.carb-count { color: var(--text-muted); }

/* Meal cards */
.meal-card { background: var(--surface); border: 2px solid var(--border); }
.meal-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.4); transform: translateY(-1px); }
.meal-card.sel-alh  { border-color: var(--alh);  background: var(--alh-light); }
.meal-card.sel-ato  { border-color: var(--ato);  background: var(--ato-light); }
.meal-card.sel-both { border-color: #c8a97a; background: rgba(200,169,122,0.07); }
.meal-check { background: var(--border); }
.meal-card.sel-alh  .meal-check { background: var(--alh);  color: #0c0e0d; }
.meal-card.sel-ato  .meal-check { background: var(--ato);  color: #0c0e0d; }
.meal-card.sel-both .meal-check { background: #c8a97a; color: #0c0e0d; }
.meal-id   { color: var(--text-muted); }
.meal-name { color: var(--text); }
.macro-who.alh { background: var(--alh-light); color: var(--alh); }
.macro-who.ato { background: var(--ato-light); color: var(--ato); }
.macro-val { color: var(--text-muted); }
.meal-note { background: rgba(240,180,41,0.09); border: 1px solid rgba(240,180,41,0.2); color: var(--total); font-style: italic; }

/* Person panels */
.person-panel { background: var(--surface); border: 2px solid var(--border); }
.person-panel.panel-alh { border-color: rgba(61,220,132,0.3); }
.person-panel.panel-ato { border-color: rgba(74,158,255,0.3); }
.panel-header { border-bottom: 1px solid var(--border); }
.panel-badge.alh { background: var(--alh-light); color: var(--alh); }
.panel-badge.ato { background: var(--ato-light); color: var(--ato); }
.panel-sel-count { color: var(--text-muted); }

/* Shopping */
.divider { border-top: 1px solid var(--border); }
.shopping-empty { background: var(--surface); border: 2px dashed var(--border); color: var(--text-muted); }
.selected-pill { background: var(--alh-light); color: var(--alh); border: 1px solid rgba(61,220,132,0.2); }
.selected-pill.ato-pill { background: var(--ato-light); color: var(--ato); border-color: rgba(74,158,255,0.2); }
.btn { font-family: 'DM Mono', monospace; }
.btn-print { background: var(--text); color: var(--bg); }
.btn-clear { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

/* Tables */
.cat-header { background: var(--surface2); color: var(--text); border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; }
.shopping-table { background: var(--surface); border-radius: 0 0 8px 8px; box-shadow: none; }
.shopping-table th, .shopping-table td { border-bottom: 1px solid var(--border); }
.th-check, .th-item, .th-tags { background: var(--surface2); color: var(--text); }
.th-total { background: var(--total-light); color: var(--total-header); }
.th-ato   { background: var(--ato-light);   color: var(--ato-header); }
.th-alh   { background: var(--alh-light);   color: var(--alh-header); }
.td-total { background: var(--total-light); color: var(--total); }
.td-ato   { background: var(--ato-light);   color: var(--ato); }
.td-alh   { background: var(--alh-light);   color: var(--alh); }
.td-item  { color: var(--text); }
.td-taste { color: var(--text-muted); }
.shopping-table tr.have-it .td-item,
.shopping-table tr.have-it .td-total,
.shopping-table tr.have-it .td-ato,
.shopping-table tr.have-it .td-alh,
.shopping-table tr.have-it .td-tags { opacity: 0.25; }
.shopping-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Shop plan */
.shop-plan-notice { background: var(--total-light); border: 1.5px solid rgba(240,180,41,0.2); color: var(--total); }
.shop-group { background: var(--surface); box-shadow: none; border: 1px solid var(--border); border-radius: 10px; }
.shop-plan-table td { border-bottom: 1px solid var(--border); }
.shop-plan-table tr:hover td { background: rgba(255,255,255,0.02); }
.sp-name { color: var(--text); }
.sp-desc { color: var(--text-muted); }
.sp-qty  { color: var(--text-muted); }
.btn-reassign { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); font-family: 'DM Mono', monospace; }
.btn-reassign:hover { border-color: var(--alh); color: var(--alh); }

input[type="checkbox"] { accent-color: var(--alh); }

</style>
</head>
<body>

<div class="header">
  <h1>Meal Prep Planner</h1>
</div>

<div class="mode-bar">
  <div class="mode-label">Prep Mode</div>
  <div class="mode-toggle">
    <button class="mode-btn active-same" id="btn-same" onclick="setMode('same')">⊙ Same Meals</button>
    <button class="mode-btn" id="btn-diff" onclick="setMode('diff')">— Different Meals</button>
  </div>
  <div class="mode-hint" id="mode-hint">Both cooking the same meals — one selection applies to both</div>
</div>

<div class="main">

  <!-- SELECT MEALS -->
  <div class="section-title">Select Meals <span class="sub" id="sel-count-label"></span></div>
  <div id="meal-selector"></div>

  <hr class="divider">

  <!-- SHOPPING LIST -->
  <div class="section-title">Shopping List <span class="sub">Tick items you already have to cross them off</span></div>
  <div id="empty-state" class="shopping-empty">
    <p>No meals selected yet</p>
    <small>Select meals above to generate your shopping list</small>
  </div>
  <div id="shopping-content" style="display:none">
    <div class="shopping-header">
      <div class="selected-pills" id="selected-pills"></div>
      <div class="actions">
        <button class="btn btn-clear" onclick="clearAll()">✕ Clear All</button>
        <button class="btn btn-print" onclick="window.print()">🖨 Print List</button>
      </div>
    </div>
    <div id="shopping-body"></div>
  </div>

  <!-- SHOP PLAN -->
  <div class="shop-plan-section" id="shop-plan-section" style="display:none">
    <hr class="divider" style="margin-top:0">
    <div class="section-title">Shop Plan <span class="sub" id="shop-plan-sub">Based on what you still need to buy</span></div>
    <div id="shop-plan-body"></div>
  </div>

</div>

// ─── UTILS ─────────────────────────────────────────────────────────────────
function fmtTsp(v){v=parseFloat(v.toFixed(1));if(v<3)return v+" tsp";const t=Math.floor(v/3),r=parseFloat((v%3).toFixed(1));return r===0?t+" tbsp":t+" tbsp +"+r+" tsp";}
function fmt(v,u){v=parseFloat(v.toFixed(1));
  if(u==="g")   return v>=1000?(v/1000).toFixed(1).replace(/\.0$/,"")+"kg":v+"g";
  if(u==="ml")  return v>=1000?(v/1000).toFixed(1).replace(/\.0$/,"")+"L":v+"ml";
  if(u==="tsp") return fmtTsp(v);
  if(u==="pcs") return Math.round(v)+" pcs";
  if(u==="cans"){const r=parseFloat(v.toFixed(1));return r+" can"+(r!==1?"s":"");}
  if(u==="bunch") return Math.ceil(v)+" bunch";
  return v+" "+u;
}
function tagHtml(mealId,who){
  const m=MEALS.find(x=>x.id===mealId);if(!m)return"";
  const c=m.color,wl=who==="alh"?" · ALH":who==="ato"?" · ATO":"";
  return`<span class="tag" style="background:${c}18;color:${c};border-color:${c}50">${m.id} ${m.short}${wl}</span>`;
}

// ─── MEAL SELECTOR ─────────────────────────────────────────────────────────
function renderMealSelector(){
  const selCount=mode==="same"?selSame.size:Math.max(selAlh.size,selAto.size);
  document.getElementById('sel-count-label').textContent=selCount>0?selCount+" selected":"";
  if(mode==="same"){
    let html="";
    CARB_GROUPS.forEach(g=>{
      const meals=MEALS.filter(m=>m.carbGroup===g.key);
      const selCount=meals.filter(m=>selSame.has(m.id)).length;
      html+=`<div class="carb-group">
        <div class="carb-group-header">${g.emoji} ${g.label}
          <span class="carb-count">${meals.length} meal${meals.length!==1?"s":""}${selCount>0?`, ${selCount} selected`:""}</span>
        </div>
        <div class="meal-grid">${meals.map(m=>mealCard(m,"same")).join("")}</div>
      </div>`;
    });
    document.getElementById('meal-selector').innerHTML=html;
  } else {
    let html=`<div class="person-panels">`;
    ["alh","ato"].forEach(who=>{
      const sel=who==="alh"?selAlh:selAto;
      const label=who==="alh"?"ALH — Ami":"ATO — Andy";
      let inner="";
      CARB_GROUPS.forEach(g=>{
        const meals=MEALS.filter(m=>m.carbGroup===g.key);
        inner+=`<div class="carb-group">
          <div class="carb-group-header" style="font-size:12px">${g.emoji} ${g.label}
            <span class="carb-count">${meals.filter(m=>sel.has(m.id)).length} sel.</span>
          </div>
          <div class="meal-grid compact">${meals.map(m=>mealCard(m,who)).join("")}</div>
        </div>`;
      });
      html+=`<div class="person-panel panel-${who}">
        <div class="panel-header">
          <span class="panel-badge ${who}">${label}</span>
          <span class="panel-sel-count">${sel.size}/4 selected</span>
        </div>${inner}
      </div>`;
    });
    html+="</div>";
    document.getElementById('meal-selector').innerHTML=html;
  }
}

function mealCard(m,who){
  const inSame=selSame.has(m.id),inAlh=selAlh.has(m.id),inAto=selAto.has(m.id);
  let cls="",chk="✓";
  if(who==="same"){cls=inSame?"sel-both":"";}
  else if(who==="alh"){cls=inAlh?(inAto?"sel-both":"sel-alh"):"";if(!inAlh)chk="";}
  else{cls=inAto?(inAlh?"sel-both":"sel-ato"):"";if(!inAto)chk="";}
  return`<div class="meal-card ${cls}" onclick="toggleMeal('${m.id}','${who}')">
    <div class="meal-check">${cls?chk:""}</div>
    <div class="meal-id">${m.id}</div>
    <div class="meal-name">${m.name}</div>
    ${m.note?`<div class="meal-note">🌭 ${m.note}</div>`:""}
    <div class="meal-macros">
      <div class="macro-row"><span class="macro-who alh">ALH</span><span class="macro-val">${m.alhMacros.kcal} kcal · ${m.alhMacros.p}p · ${m.alhMacros.c}c · ${m.alhMacros.f}f</span></div>
      <div class="macro-row"><span class="macro-who ato">ATO</span><span class="macro-val">${m.atoMacros.kcal} kcal · ${m.atoMacros.p}p · ${m.atoMacros.c}c · ${m.atoMacros.f}f</span></div>
    </div>
  </div>`;
}

function toggleMeal(id,who){
  if(who==="same"){selSame.has(id)?selSame.delete(id):selSame.size<4&&selSame.add(id);}
  else if(who==="alh"){selAlh.has(id)?selAlh.delete(id):selAlh.size<4&&selAlh.add(id);}
  else{selAto.has(id)?selAto.delete(id):selAto.size<4&&selAto.add(id);}
  overrides={};
  renderAll();
}

function setMode(m){
  mode=m;
  document.getElementById('btn-same').className='mode-btn'+(m==='same'?' active-same':'');
  document.getElementById('btn-diff').className='mode-btn'+(m==='diff'?' active-diff':'');
  document.getElementById('mode-hint').textContent=m==='same'
    ?'Both cooking the same meals — one selection applies to both'
    :'Select meals independently for each person';
  overrides={};
  renderAll();
}

// ─── SHOPPING LIST ─────────────────────────────────────────────────────────
function hasAnySelected(){return mode==="same"?selSame.size>0:(selAlh.size+selAto.size)>0;}

function buildShoppingList(){
  const measured={},pantry={};
  function addIng(meal,who){
    meal.ingredients.forEach(ing=>{
      if(ing.taste){
        if(!pantry[ing.key])pantry[ing.key]={name:ing.name,cat:ing.cat,tags:[],key:ing.key};
        pantry[ing.key].tags.push({id:meal.id,who});
      } else {
        const k=ing.key+"|"+ing.alh.u;
        if(!measured[k])measured[k]={name:ing.name,cat:ing.cat,u:ing.alh.u,alh:0,ato:0,tags:[],rowKey:k,key:ing.key};
        if(who==="alh"||who==="both")measured[k].alh+=ing.alh.v;
        if(who==="ato"||who==="both")measured[k].ato+=ing.ato.v;
        measured[k].tags.push({id:meal.id,who});
      }
    });
  }
  if(mode==="same"){
    selSame.forEach(id=>{const m=MEALS.find(x=>x.id===id);if(m)addIng(m,"both");});
  } else {
    selAlh.forEach(id=>{const m=MEALS.find(x=>x.id===id);if(m)addIng(m,selAto.has(id)?"both":"alh");});
    selAto.forEach(id=>{if(!selAlh.has(id)){const m=MEALS.find(x=>x.id===id);if(m)addIng(m,"ato");}});
  }
  const byCat={};
  Object.values(measured).forEach(item=>{if(!byCat[item.cat])byCat[item.cat]=[];byCat[item.cat].push(item);});
  if(Object.keys(pantry).length)byCat.pantry=Object.values(pantry).map(v=>({...v,isPantry:true,rowKey:"p-"+v.name}));
  return byCat;
}

function renderShopping(){
  if(!hasAnySelected()){
    document.getElementById('empty-state').style.display='block';
    document.getElementById('shopping-content').style.display='none';
    document.getElementById('shop-plan-section').style.display='none';
    return;
  }
  document.getElementById('empty-state').style.display='none';
  document.getElementById('shopping-content').style.display='block';
  document.getElementById('shop-plan-section').style.display='block';

  // Pills
  let pillsHtml="";
  if(mode==="same"){
    pillsHtml=[...selSame].map(id=>{const m=MEALS.find(x=>x.id===id);return m?`<span class="selected-pill">${m.id} ${m.short}</span>`:""}).join("");
  } else {
    pillsHtml=[...selAlh].map(id=>{const m=MEALS.find(x=>x.id===id);return m?`<span class="selected-pill">${m.id} ${m.short}</span>`:""}).join("")+
              [...selAto].map(id=>{const m=MEALS.find(x=>x.id===id);return m?`<span class="selected-pill ato-pill">${m.id} ${m.short}</span>`:""}).join("");
  }
  document.getElementById('selected-pills').innerHTML=pillsHtml;

  const byCat=buildShoppingList();
  const sortedCats=Object.keys(byCat).sort((a,b)=>(CATEGORIES[a]?.order||99)-(CATEGORIES[b]?.order||99));
  let html="";
  sortedCats.forEach(cat=>{
    const items=byCat[cat];
    html+=`<div class="table-section"><div class="cat-header">${CATEGORIES[cat].label}</div>
    <table class="shopping-table"><thead><tr>
      <th class="th-check"></th><th class="th-item">Ingredient</th>
      <th class="th-total">Total to Buy</th><th class="th-ato">ATO (5 servings)</th>
      <th class="th-alh">ALH (5 servings)</th><th class="th-tags">Meals</th>
    </tr></thead><tbody>`;
    items.forEach(item=>{
      const rk=(item.rowKey||item.name).replace(/[^a-zA-Z0-9-]/g,"_");
      const tagsHtml=(item.tags||[]).map(t=>tagHtml(t.id,t.who)).join("");
      const haveCls=haveRows.has(rk)?" have-it":"";
      if(item.isPantry){
        html+=`<tr id="r-${rk}" class="${haveCls}">
          <td class="td-check"><input type="checkbox" ${haveRows.has(rk)?"checked":""} onchange="toggleHave('${rk}')"></td>
          <td class="td-item">${item.name}</td>
          <td class="td-total td-taste">To taste</td>
          <td class="td-ato td-taste">To taste</td>
          <td class="td-alh td-taste">To taste</td>
          <td>${tagsHtml}</td></tr>`;
      } else {
        const total=fmt(item.alh+item.ato,item.u);
        const ato=item.ato>0?fmt(item.ato,item.u):`<span class="td-none">—</span>`;
        const alh=item.alh>0?fmt(item.alh,item.u):`<span class="td-none">—</span>`;
        html+=`<tr id="r-${rk}" class="${haveCls}">
          <td class="td-check"><input type="checkbox" ${haveRows.has(rk)?"checked":""} onchange="toggleHave('${rk}')"></td>
          <td class="td-item">${item.name}</td>
          <td class="td-total">${total}</td>
          <td class="td-ato">${ato}</td>
          <td class="td-alh">${alh}</td>
          <td>${tagsHtml}</td></tr>`;
      }
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('shopping-body').innerHTML=html;
  renderShopPlan(byCat);
}

function toggleHave(rk){
  haveRows.has(rk)?haveRows.delete(rk):haveRows.add(rk);
  overrides={};
  renderShopping();
}

function canSupply(key,shop){
  const dbId=KEY_TO_ID[key];
  if(!dbId||!FOOD_DB[dbId])return false;
  return FOOD_DB[dbId].shops[shop]==="Y";
}
function isOnlineOnly(key){
  const dbId=KEY_TO_ID[key];
  if(!dbId||!FOOD_DB[dbId])return false;
  const s=FOOD_DB[dbId].shops;
  return s.Aldi==="N"&&s.Lidl==="N"&&s["M&S"]==="N"&&s.Tesco==="N"&&s.Asda==="N"&&s.Morrisons==="N"&&s["Sainsbury's"]==="N"&&s.Online==="Y";
}
function getNextShop(key,currentShop,currentAssignments){
  const dbId=KEY_TO_ID[key];
  if(!dbId||!FOOD_DB[dbId])return null;
  const s=FOOD_DB[dbId].shops;
  // Build ordered list of available shops for this item
  const ordered=[];
  SHOP_TIERS.forEach(tier=>tier.shops.forEach(sh=>{if(s[sh]==="Y")ordered.push(sh);}));
  const idx=ordered.indexOf(currentShop);
  if(idx===-1)return null;
  const remaining=ordered.slice(idx+1);
  if(!remaining.length)return null;
  // Prefer a shop we're already visiting
  const visiting=new Set(Object.values(currentAssignments||{}));
  const alreadyThere=remaining.find(sh=>visiting.has(sh));
  return alreadyThere||remaining[0];
}
function assignShops(items){
  const assignments={};
  // Online-only first
  items.forEach(item=>{if(isOnlineOnly(item.key))assignments[item.key]="Online";});
  let left=items.filter(i=>!assignments[i.key]);
  SHOP_TIERS.filter(t=>!t.shops.includes("Online")).forEach(tier=>{
    if(!left.length)return;
    let eligible=left.filter(i=>tier.shops.some(s=>canSupply(i.key,s)));
    if(!eligible.length)return;
    let rem=[...eligible];
    while(rem.length){
      let best=null,bestN=0;
      tier.shops.forEach(s=>{const n=rem.filter(i=>canSupply(i.key,s)).length;if(n>bestN){bestN=n;best=s;}});
      if(!best)break;
      rem.filter(i=>canSupply(i.key,best)).forEach(i=>{assignments[i.key]=best;});
      rem=rem.filter(i=>!assignments[i.key]);
    }
    left=left.filter(i=>!assignments[i.key]);
  });
  left.forEach(i=>{if(!assignments[i.key])assignments[i.key]="?";});
  return assignments;
}

function renderShopPlan(byCat){
  // Collect all items NOT ticked as "have it"
  const allItems=[];
  Object.values(byCat).forEach(items=>{
    items.forEach(item=>{
      const rk=(item.rowKey||item.name).replace(/[^a-zA-Z0-9-]/g,"_");
      if(!haveRows.has(rk)){
        allItems.push({key:item.key,name:item.name,cat:item.cat,taste:item.isPantry||false,alh:item.alh||0,ato:item.ato||0,unit:item.u||null});
      }
    });
  });

  if(!allItems.length){
    document.getElementById('shop-plan-body').innerHTML=`<div class="shopping-empty"><p>🎉 Nothing to buy!</p><small>You've ticked everything off already.</small></div>`;
    return;
  }

  // Apply manual overrides, assign the rest
  const forAssign=allItems.filter(i=>!overrides[i.key]);
  const base=assignShops(forAssign);
  const assignments={...base,...overrides};

  // Check if online needed
  const hasOnline=allItems.some(i=>assignments[i.key]==="Online");

  // Group by shop in tier order
  const byShop={};
  allItems.forEach(i=>{
    const shop=assignments[i.key]||"?";
    if(!byShop[shop])byShop[shop]=[];
    byShop[shop].push(i);
  });
  const CAT_ORDER={meat:1,produce:2,dairy:3,dry:4,sauce:5,spice:6,pantry:7};
  const shopOrder=[];
  SHOP_TIERS.forEach(tier=>tier.shops.forEach(s=>{if(byShop[s])shopOrder.push(s);}));
  if(byShop["?"])shopOrder.push("?");

  let html="";
  if(hasOnline){
    html+=`<div class="shop-plan-notice">📦 <strong>Online order needed</strong> — one or more items below are only available online. Place that order separately before your shop trip.</div>`;
  }

  shopOrder.forEach(shop=>{
    const items=byShop[shop];
    if(!items||!items.length)return;
    items.sort((a,b)=>(CAT_ORDER[a.cat]||9)-(CAT_ORDER[b.cat]||9)||a.name.localeCompare(b.name));
    const css=SHOP_CSS[shop]||"sh-online";
    const emoji=SHOP_EMOJI[shop]||"🛒";
    html+=`<div class="shop-group">
      <div class="shop-group-header ${css}">
        <div class="shop-group-name">${emoji} ${shop}</div>
        <div class="shop-group-count">${items.length} item${items.length!==1?"s":""}</div>
      </div>
      <table class="shop-plan-table"><tbody>`;
    items.forEach(item=>{
      const dbId=KEY_TO_ID[item.key];
      const desc=dbId&&FOOD_DB[dbId]?FOOD_DB[dbId].desc:"";
      const qty=item.taste?"to taste":fmt(item.alh+item.ato,item.unit);
      const next=getNextShop(item.key,shop,assignments);
      html+=`<tr>
        <td><div class="sp-name">${item.name}</div>${desc?`<div class="sp-desc">${desc}</div>`:""}</td>
        <td class="sp-qty">${qty}</td>
        <td class="sp-action">${next
          ?`<button class="btn-reassign" onclick="reassign('${item.key}','${next}')">Not here → ${next}</button>`
          :`<span class="sp-only">only here</span>`
        }</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('shop-plan-body').innerHTML=html;
  document.getElementById('shop-plan-sub').textContent=`Based on ${allItems.length} item${allItems.length!==1?"s":""} still to buy`;
}

function reassign(key,newShop){overrides[key]=newShop;renderShopping();}
function clearAll(){selSame.clear();selAlh.clear();selAto.clear();haveRows.clear();overrides={};renderAll();}
function renderAll(){renderMealSelector();renderShopping();}
renderAll();
</script>
