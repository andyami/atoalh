<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Andy's Meds">
<title>Andy's Meds — for Ami</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0e0d;--card:#141714;--card2:#1c201c;
  --border:#222822;--border2:#2e362e;
  --green:#3ddc84;--green-bg:rgba(61,220,132,0.08);--green-border:rgba(61,220,132,0.22);
  --gold:#C59100;--gold-bg:rgba(197,145,0,0.08);--gold-border:rgba(197,145,0,0.22);
  --amber:#f0b429;--amber-bg:rgba(240,180,41,0.09);--amber-border:rgba(240,180,41,0.18);
  --red:#ff5757;--red-bg:rgba(255,87,87,0.08);--red-border:rgba(255,87,87,0.18);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.08);
  --orange:#f97316;
  --text:#dde6df;--muted:#586860;--muted2:#3a4440;
  --mono:'DM Mono',monospace;--head:'Syne',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased}
.app{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:60px}

.hdr{padding:44px 22px 16px}
.hdr-eyebrow{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.hdr-title{font-family:var(--head);font-size:32px;font-weight:800;line-height:1.02;letter-spacing:-0.02em;color:var(--text)}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:12.5px;color:var(--muted);margin-top:8px}
.hdr-sub b{color:var(--green)}

.pulse{width:100%;height:26px;margin:2px 0 6px;overflow:hidden;padding:0 22px}
.pulse svg{width:200%;height:100%;display:block}
.pulse path{fill:none;stroke:var(--green);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;opacity:0.55}
.pulse-anim{animation:pulseMove 7s linear infinite}
@media (prefers-reduced-motion: reduce){ .pulse-anim{animation:none} }
@keyframes pulseMove{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

.tab-bar{display:flex;gap:0;padding:8px 22px 0;margin-bottom:6px}
.tab-btn{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--muted);font-family:var(--mono);font-size:12.5px;font-weight:500;letter-spacing:0.04em;cursor:pointer;border-bottom:2px solid var(--border2);transition:color 0.15s,border-color 0.15s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.view{padding:4px 22px 10px}

.sec-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec-lbl:first-child{margin-top:14px}

.hero{background:var(--card);border:1px solid var(--green-border);border-radius:14px;padding:18px;margin-bottom:6px}
.hero.done{border-color:var(--green-border);background:var(--green-bg)}
.hero-eyebrow{font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.hero-headline{font-family:var(--head);font-size:20px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:4px}
.hero.done .hero-headline{color:var(--green)}
.hero-detail{font-size:12.5px;color:var(--muted)}
.hero-stats{display:flex;gap:10px;margin-top:14px}
.hero-stat{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 10px}
.hero-stat .n{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text)}
.hero-stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:1px}

.step-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 15px;margin-bottom:8px;display:flex;align-items:center;gap:13px}
.step-body{flex:1;min-width:0}
.step-title{font-size:14.5px;font-weight:500;color:var(--text);margin-bottom:2px}
.step-detail{font-size:12px;color:var(--muted);line-height:1.5}
.step-note{font-size:11px;color:var(--muted2);margin-top:2px}
.step-expiring{font-size:10.5px;color:var(--amber);font-weight:500;margin-top:3px;letter-spacing:0.03em}

.check-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--green-border);background:transparent;color:var(--green);font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s}
.check-btn.taken{background:var(--green);color:var(--bg);border-color:var(--green)}
.taken-time{font-size:10.5px;color:var(--green);font-family:var(--mono);text-align:center;margin-top:4px;width:40px;flex-shrink:0}

.expired-note{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 15px;font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:8px}

.prn-card{background:var(--card);border:1px solid var(--amber-border);border-radius:13px;padding:15px;margin-bottom:10px}
.prn-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.prn-name{font-size:14.5px;font-weight:500;color:var(--text)}
.prn-note{font-size:11.5px;color:var(--muted);margin-top:2px;max-width:230px;line-height:1.5}
.prn-count{font-family:var(--mono);font-size:12.5px;color:var(--muted);text-align:right}
.prn-count b{color:var(--amber)}
.prn-last{font-size:10.5px;color:var(--muted2);margin-top:3px}
.prn-buttons{display:flex;gap:8px}
.prn-btn{flex:1;padding:11px 0;border-radius:10px;border:1px solid var(--amber-border);background:var(--amber-bg);color:var(--amber);font-weight:500;font-size:13px;cursor:pointer;font-family:var(--mono)}
.prn-btn:active{background:var(--amber);color:var(--bg)}
.prn-log{margin-top:10px}
.prn-entry{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding:7px 0;border-top:1px solid var(--border)}
.prn-entry .undo{color:var(--red);font-size:11px;cursor:pointer;font-weight:500}

.note-red{border-left:2px solid var(--red);padding:11px 14px;font-size:12.5px;color:var(--red);line-height:1.6;margin-bottom:10px;border-radius:0 9px 9px 0;background:var(--red-bg);display:flex;flex-direction:column;gap:9px}
.note-red .wb-actions{display:flex;gap:8px}
.note-red button{flex:1;padding:9px 0;border-radius:8px;border:none;font-weight:500;font-size:12px;cursor:pointer;font-family:var(--mono)}
.wb-cancel{background:transparent;color:var(--red);border:1px solid var(--red-border) !important}
.wb-confirm{background:var(--red);color:var(--bg)}

.hist-item{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;padding:14px 15px;cursor:pointer}
.hist-date{font-weight:700;font-size:14px;font-family:var(--head);color:var(--text)}
.hist-summary{font-size:12px;color:var(--muted);margin-top:3px}
.hist-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.hist-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--muted)}
.hist-row .ok{color:var(--green);font-weight:500}
.hist-row .no{color:var(--muted2)}
.hist-prn-line{font-size:12px;color:var(--muted);margin-top:7px}
.hist-prn-line b{color:var(--amber)}

.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 10px}
.footnote{text-align:center;font-size:11px;color:var(--muted2);margin-top:22px;padding:0 22px;line-height:1.6}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-eyebrow">Recovery tracker</div>
    <div class="hdr-title">Andy's <span>Meds</span></div>
    <div class="hdr-sub" id="subtitle">Loading…</div>
  </header>

  <div class="pulse">
    <svg viewBox="0 0 400 40" preserveAspectRatio="none">
      <path class="pulse-anim" d="M0,20 L60,20 L75,20 L85,4 L95,36 L105,20 L120,20 L400,20 L460,20 L475,4 L485,36 L495,20 L510,20 L800,20"/>
    </svg>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabToday" onclick="setTab('today')">TODAY</button>
    <button class="tab-btn" id="tabHistory" onclick="setTab('history')">HISTORY</button>
  </div>

  <div class="view" id="app"><div class="loading">Loading…</div></div>

  <p class="footnote">Saved automatically on this phone. Furosemide course auto-expires 7 days after discharge (19 July).</p>
</div>

<script>
const DISCHARGE_DATE = '2026-07-13';

const MEDS = [
  {id:'furosemide',   name:'Furosemide',   dose:'20mg · 1 tablet',    slot:'morning', note:'Reduces fluid retention', expiresDay:7},
  {id:'bisoprolol',   name:'Bisoprolol',   dose:'2.5mg · 1 tablet',   slot:'morning', note:'Heart rate & blood pressure'},
  {id:'lansoprazole', name:'Lansoprazole', dose:'30mg · 1 capsule',   slot:'morning', note:'Acid reflux protection'},
  {id:'aspirin',      name:'Aspirin',      dose:'75mg · 1 tablet',    slot:'morning', note:'Blood thinner'},
  {id:'finasteride',  name:'Finasteride',  dose:'1mg · 1 tablet',     slot:'morning', note:'Restarted on discharge'}
];

const PRN_MEDS = [
  {id:'paracetamol', name:'Paracetamol', dose:'2 × 500mg (1g)', note:'Main pain relief', maxPerDay:4, minGapHours:4, single:true, category:'pain'},
  {id:'codeine', name:'Codeine', dose:'30mg tablets', note:'Only if needed — can cause constipation', maxTabsPerDay:8, minGapHours:4, single:false, category:'pain'},
  {id:'dulcolax', name:'Dulcolax', dose:'5mg tablets', note:'Usually the one that works — 1 to 2 tablets', maxTabsPerDay:4, minGapHours:6, single:false, category:'constipation'},
  {id:'docusate', name:'Docusate', dose:'100mg capsules', note:'For constipation', maxTabsPerDay:4, minGapHours:6, single:false, category:'constipation'},
  {id:'senokot', name:'Senokot syrup', dose:'10mL', note:'For constipation', maxPerDay:2, minGapHours:8, single:true, category:'constipation'}
];

let currentTab = 'today';
let dayCache = {};
let knownDates = [];
let pendingWarning = null;
let historyOpen = {};

function todayKey(){ return toDateKey(new Date()); }
function toDateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDateKey(k){
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function daysBetween(aKey, bKey){
  return Math.round((parseDateKey(bKey) - parseDateKey(aKey)) / 86400000);
}
function formatDateLabel(k){
  const d = parseDateKey(k);
  return d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
}
function formatTime(iso){
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function hoursSince(iso){
  return (Date.now() - new Date(iso).getTime()) / 3600000;
}

function medsForDate(dateKey){
  const diff = daysBetween(DISCHARGE_DATE, dateKey);
  return MEDS.filter(m => m.expiresDay ? diff < m.expiresDay : true);
}

async function loadDay(dateKey){
  if(dayCache[dateKey]) return dayCache[dateKey];
  let data = {scheduled:{}, prn:{}};
  try{
    const res = await window.storage.get('day:'+dateKey, false);
    if(res && res.value) data = JSON.parse(res.value);
  }catch(e){ /* no data yet for this date */ }
  dayCache[dateKey] = data;
  return data;
}
async function saveDay(dateKey){
  try{
    await window.storage.set('day:'+dateKey, JSON.stringify(dayCache[dateKey]), false);
  }catch(e){ console.error('Storage error', e); }
  if(!knownDates.includes(dateKey)){
    knownDates.push(dateKey);
    knownDates.sort();
    try{ await window.storage.set('known-dates', JSON.stringify(knownDates), false); }catch(e){}
  }
}
async function loadKnownDates(){
  try{
    const res = await window.storage.get('known-dates', false);
    if(res && res.value) knownDates = JSON.parse(res.value);
  }catch(e){ knownDates = []; }
}

async function markTaken(dateKey, medId){
  const data = await loadDay(dateKey);
  if(data.scheduled[medId]){
    delete data.scheduled[medId];
  }else{
    data.scheduled[medId] = new Date().toISOString();
  }
  await saveDay(dateKey);
  render();
}

function prnEntriesToday(medId){
  const data = dayCache[todayKey()] || {prn:{}};
  return (data.prn && data.prn[medId]) || [];
}

function checkPrnWarning(med, tabs){
  const entries = prnEntriesToday(med.id);
  if(entries.length){
    const last = entries[entries.length-1];
    const gap = hoursSince(last.time);
    if(gap < med.minGapHours){
      return `It's only been ${gap.toFixed(1)}h since the last dose (${med.name} recommended gap is ${med.minGapHours}h).`;
    }
  }
  if(med.single && entries.length >= med.maxPerDay){
    return `${med.name} has already been logged ${entries.length} times today (max ${med.maxPerDay}).`;
  }
  if(!med.single){
    const totalTabs = entries.reduce((s,e)=>s+e.tabs,0);
    if(totalTabs + tabs > med.maxTabsPerDay){
      return `This would take today's ${med.name} total to ${totalTabs+tabs} tablets — max is ${med.maxTabsPerDay} in 24 hours.`;
    }
  }
  return null;
}

async function logPrnConfirmed(medId, tabs){
  const dateKey = todayKey();
  const data = await loadDay(dateKey);
  if(!data.prn) data.prn = {};
  if(!data.prn[medId]) data.prn[medId] = [];
  data.prn[medId].push({time: new Date().toISOString(), tabs: tabs});
  await saveDay(dateKey);
  pendingWarning = null;
  render();
}

function attemptLogPrn(medId, tabs){
  const med = PRN_MEDS.find(m=>m.id===medId);
  const warning = checkPrnWarning(med, tabs);
  if(warning){
    pendingWarning = {medId, tabs, warning};
    render();
  }else{
    logPrnConfirmed(medId, tabs);
  }
}

async function undoPrn(medId, index){
  const dateKey = todayKey();
  const data = await loadDay(dateKey);
  data.prn[medId].splice(index,1);
  await saveDay(dateKey);
  render();
}

function setTab(tab){
  currentTab = tab;
  document.getElementById('tabToday').classList.toggle('active', tab==='today');
  document.getElementById('tabHistory').classList.toggle('active', tab==='history');
  render();
}

async function toggleHistoryDate(dateKey){
  historyOpen[dateKey] = !historyOpen[dateKey];
  if(historyOpen[dateKey]) await loadDay(dateKey);
  render();
}

function renderSubtitle(){
  const diff = daysBetween(DISCHARGE_DATE, todayKey());
  document.getElementById('subtitle').innerHTML =
    `Discharged 13 July · <b>Day ${diff+1} of recovery</b>`;
}

function renderToday(){
  const dateKey = todayKey();
  const data = dayCache[dateKey] || {scheduled:{}, prn:{}};
  const meds = medsForDate(dateKey);
  const morning = meds.filter(m=>m.slot==='morning');
  const night = meds.filter(m=>m.slot==='night');

  const allOrdered = [...morning, ...night];
  const nextUndone = allOrdered.find(m => !data.scheduled[m.id]);
  let heroHtml;
  if(nextUndone){
    heroHtml = `
      <div class="hero">
        <div class="hero-eyebrow">Next up</div>
        <div class="hero-headline">${nextUndone.name} — ${nextUndone.dose}</div>
        <div class="hero-detail">${nextUndone.slot === 'morning' ? 'Morning dose' : 'Night dose'}${nextUndone.note ? ' · ' + nextUndone.note : ''}</div>
        ${renderHeroStats(data)}
      </div>`;
  }else{
    heroHtml = `
      <div class="hero done">
        <div class="hero-eyebrow">All scheduled meds done</div>
        <div class="hero-headline">Nice work ✓</div>
        <div class="hero-detail">Everything for today has been marked as taken.</div>
        ${renderHeroStats(data)}
      </div>`;
  }

  let html = heroHtml;
  html += renderMedSection('Morning', morning, data, dateKey);
  html += renderMedSection('Night', night, data, dateKey);
  html += renderExpiredNote(dateKey);
  html += renderPrnSection(data);

  document.getElementById('app').innerHTML = html;
}

function renderHeroStats(data){
  const para = (data.prn && data.prn['paracetamol']) || [];
  const cod = (data.prn && data.prn['codeine']) || [];
  const codTabs = cod.reduce((s,e)=>s+e.tabs,0);
  return `
    <div class="hero-stats">
      <div class="hero-stat"><div class="n">${para.length}/4</div><div class="l">Paracetamol today</div></div>
      <div class="hero-stat"><div class="n">${codTabs}/8</div><div class="l">Codeine tabs today</div></div>
    </div>`;
}

function renderMedSection(title, meds, data, dateKey){
  if(!meds.length) return '';
  let rows = meds.map(m=>{
    const takenAt = data.scheduled[m.id];
    return `
      <div class="step-card">
        <div class="step-body">
          <div class="step-title">${m.group || m.name}</div>
          <div class="step-detail">${m.dose}</div>
          ${m.note ? `<div class="step-note">${m.note}</div>` : ''}
          ${m.expiresDay ? `<div class="step-expiring">7-DAY COURSE</div>` : ''}
        </div>
        <div>
          <div class="check-btn ${takenAt ? 'taken' : ''}" onclick="markTaken('${dateKey}','${m.id}')">${takenAt ? '✓' : ''}</div>
          <div class="taken-time">${takenAt ? formatTime(takenAt) : ''}</div>
        </div>
      </div>`;
  }).join('');
  return `<div class="sec-lbl">${title}</div>${rows}`;
}

function renderExpiredNote(dateKey){
  const diff = daysBetween(DISCHARGE_DATE, dateKey);
  const furo = MEDS.find(m=>m.id==='furosemide');
  if(diff >= furo.expiresDay){
    return `<div class="expired-note">Furosemide course finished (was days 1–7 after discharge) — no longer listed.</div>`;
  }
  return '';
}

function renderPrnSection(data){
  let html = `<div class="sec-lbl">As needed — pain relief</div>`;
  html += renderPrnCards(PRN_MEDS.filter(m=>m.category==='pain'), data);
  html += `<div class="sec-lbl">As needed — constipation</div>`;
  html += renderPrnCards(PRN_MEDS.filter(m=>m.category==='constipation'), data);
  return html;
}

function renderPrnCards(medsList, data){
  let html = '';
  medsList.forEach(med=>{
    const entries = (data.prn && data.prn[med.id]) || [];
    const last = entries.length ? entries[entries.length-1] : null;
    const countLabel = med.single
      ? `${entries.length} / ${med.maxPerDay} today`
      : `${entries.reduce((s,e)=>s+e.tabs,0)} / ${med.maxTabsPerDay} tabs today`;

    let warningHtml = '';
    if(pendingWarning && pendingWarning.medId === med.id){
      warningHtml = `
        <div class="note-red">
          <div>⚠ ${pendingWarning.warning}</div>
          <div class="wb-actions">
            <button class="wb-cancel" onclick="pendingWarning=null;render();">Cancel</button>
            <button class="wb-confirm" onclick="logPrnConfirmed('${med.id}', ${pendingWarning.tabs})">Log anyway</button>
          </div>
        </div>`;
    }

    let buttonsHtml;
    if(med.single){
      buttonsHtml = `<div class="prn-buttons"><button class="prn-btn" onclick="attemptLogPrn('${med.id}',1)">Log dose taken</button></div>`;
    }else{
      buttonsHtml = `
        <div class="prn-buttons">
          <button class="prn-btn" onclick="attemptLogPrn('${med.id}',1)">Log 1 tablet</button>
          <button class="prn-btn" onclick="attemptLogPrn('${med.id}',2)">Log 2 tablets</button>
        </div>`;
    }

    let logHtml = '';
    if(entries.length){
      logHtml = `<div class="prn-log">` + entries.map((e,i)=>`
        <div class="prn-entry">
          <span>${formatTime(e.time)}${med.single ? '' : ' · ' + e.tabs + ' tab' + (e.tabs>1?'s':'')}</span>
          <span class="undo" onclick="undoPrn('${med.id}',${i})">undo</span>
        </div>`).join('') + `</div>`;
    }

    html += `
      <div class="prn-card">
        <div class="prn-top">
          <div>
            <div class="prn-name">${med.name}</div>
            <div class="prn-note">${med.dose} — ${med.note}</div>
            ${last ? `<div class="prn-last">Last taken ${formatTime(last.time)} (${hoursSince(last.time).toFixed(1)}h ago)</div>` : ''}
          </div>
          <div class="prn-count"><b>${countLabel}</b></div>
        </div>
        ${warningHtml}
        ${buttonsHtml}
        ${logHtml}
      </div>`;
  });
  return html;
}

async function renderHistory(){
  const dates = [...knownDates].sort().reverse();
  if(!dates.length){
    document.getElementById('app').innerHTML = `<div class="empty">Nothing logged yet — entries will appear here once meds are marked as taken.</div>`;
    return;
  }
  let html = '';
  for(const dateKey of dates){
    const isOpen = !!historyOpen[dateKey];
    const data = dayCache[dateKey];
    const meds = medsForDate(dateKey);
    let summary = '—';
    if(data){
      const total = meds.length;
      const done = meds.filter(m=>data.scheduled[m.id]).length;
      summary = `${done}/${total} scheduled meds taken`;
    }
    html += `<div class="hist-item" onclick="toggleHistoryDate('${dateKey}')">
      <div class="hist-date">${formatDateLabel(dateKey)}</div>
      <div class="hist-summary">${summary}${dateKey===todayKey() ? ' · today' : ''}</div>`;
    if(isOpen && data){
      html += `<div class="hist-detail">`;
      meds.forEach(m=>{
        const takenAt = data.scheduled[m.id];
        html += `<div class="hist-row"><span>${m.group || m.name} (${m.dose})</span><span class="${takenAt ? 'ok' : 'no'}">${takenAt ? formatTime(takenAt) : 'Not marked'}</span></div>`;
      });
      PRN_MEDS.forEach(med=>{
        const entries = (data.prn && data.prn[med.id]) || [];
        if(entries.length){
          const desc = entries.map(e => formatTime(e.time) + (med.single ? '' : ` (${e.tabs}t)`)).join(', ');
          html += `<div class="hist-prn-line"><b>${med.name}:</b> ${desc}</div>`;
        }
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('app').innerHTML = html;
}

async function render(){
  renderSubtitle();
  if(currentTab === 'today'){
    await loadDay(todayKey());
    renderToday();
  }else{
    for(const d of knownDates){ if(historyOpen[d]) await loadDay(d); }
    await renderHistory();
  }
}

(async function init(){
  await loadKnownDates();
  await loadDay(todayKey());
  render();
})();
</script>
</body>
</html>
